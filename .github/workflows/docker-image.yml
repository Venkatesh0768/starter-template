name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:

  docker:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Sanitize Docker Username
        run: |
          # Remove newlines and carriage returns from the secret
          CLEAN_USERNAME=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr -d '\n\r')
          echo "DOCKER_USERNAME=$CLEAN_USERNAME" >> $GITHUB_ENV

      # BACKEND IMAGE
      - name: Build Backend Image
        run: |
          docker build -f backend/Dockerfile -t "${{ env.DOCKER_USERNAME }}/starter-backend:latest" backend/

      - name: Push Backend Image
        run: |
          docker push "${{ env.DOCKER_USERNAME }}/starter-backend:latest"

      # FRONTEND IMAGE
      - name: Build Frontend Image
        run: |
          docker build -f frontend/Dockerfile -t "${{ env.DOCKER_USERNAME }}/starter-frontend:latest" frontend/

      - name: Push Frontend Image
        run: |
          docker push "${{ env.DOCKER_USERNAME }}/starter-frontend:latest"