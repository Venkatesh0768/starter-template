spring:
  application:
    name: backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    baseline-on-migrate: true
    enabled: true
    baseline-description: "Baseline Initial Version"
    baseline-version: 0
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          localhost: "127.0.0.1"
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  # ─── OAuth2 Social Login ───────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

server:
  port: 5000

# ─── JWT Configuration ────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}         # 1 day (ms)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days (ms)

# ─── OTP Configuration ───────────────────────────────────────────────────────
otp:
  expiration: ${OTP_EXPIRATION:300000}   # 5 minutes (ms)
  length: ${OTP_LENGTH:6}

# ─── CORS ─────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ─── App Config ───────────────────────────────────────────────────────────────
app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}

# ─── API Documentation ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: false

# ─── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  health:
    mail:
      enabled: false   # Disable SMTP health check — SMTP auth errors handled in code